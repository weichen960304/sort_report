<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>排序練習首頁</title>
	<style>
		:root {
			--bg-start: #f6fbff;
			--bg-end: #e8f3ff;
			--text: #1f2d3d;
			--accent: #0b6ef3;
			--accent-hover: #095ac4;
			--card: #ffffff;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
			color: var(--text);
			font-family: "Segoe UI", "Noto Sans TC", sans-serif;
			padding: 24px;
		}

		.card {
			width: min(520px, 100%);
			background: var(--card);
			border-radius: 16px;
			padding: 28px;
			box-shadow: 0 12px 30px rgba(11, 110, 243, 0.12);
			text-align: center;
		}

		h1 {
			margin: 0 0 12px;
			font-size: clamp(1.5rem, 3vw, 2rem);
		}

		p {
			margin: 0 0 20px;
			line-height: 1.6;
		}

		.links {
			display: flex;
			justify-content: center;
			gap: 12px;
			flex-wrap: wrap;
		}

		.link-btn {
			display: inline-block;
			text-decoration: none;
			color: #fff;
			background: var(--accent);
			padding: 12px 20px;
			border-radius: 10px;
			font-weight: 700;
			transition: background-color 0.2s ease, transform 0.2s ease;
		}

		.link-btn:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>程式練習入口</h1>
		<p>點擊下方按鈕，前往不同排序法介紹與示範頁面。</p>
		<div class="links">
			<a class="link-btn" href="bubble_sort.html">前往 Bubble Sort</a>
			<a class="link-btn" href="selection_sort.html">前往 Selection Sort</a>
		</div>
	</main>
</body>
</html>
